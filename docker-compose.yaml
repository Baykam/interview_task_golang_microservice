version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: go_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - go_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7-alpine
    container_name: go_redis
    command: redis-server --requirepass gizli_sifre
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gizli_sifre", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  rabbitmq_broker:
    image: rabbitmq:3-management-alpine
    container_name: go_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"  
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - go_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

