version: '3.8'

services:
  # 1. VERİ TABANI - POSTGRESQL
  postgres_db:
    image: postgres:15-alpine
    container_name: go_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - go_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. VERİ TABANI GÖÇÜ - GOLANG-MIGRATE
  db_migration:
    image: migrate/migrate
    container_name: bank_migration
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://myuser:mypass@postgres_db:5432/mydb?sslmode=disable
      - up
    networks:
      - go_network
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. ÖNBELLEK - REDIS
  redis_cache:
    image: redis:7-alpine
    container_name: go_redis
    command: redis-server --requirepass gizli_sifre
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gizli_sifre", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 4. MESAJ SIRA YÖNETİCİSİ - RABBITMQ
  rabbitmq_broker:
    image: rabbitmq:3-management-alpine
    container_name: go_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"  
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - go_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. HESAP SERVİSİ - ACCOUNT SERVICE
  account_service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.account
    container_name: account_service
    ports:
      - "8080:8080"   # REST API Portu
      - "50051:50051" # gRPC Server Portu
    environment:
      - CONFIG_PATH=/app/config.yaml
    networks:
      - go_network
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully

  # 6. TRANSAKSİYON SERVİSİ - TRANSACTION SERVICE
  transaction_service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.transaction
    container_name: transaction_service
    ports:
      - "50052:50052" # gRPC Server veya Alternatif Port
    environment:
      - CONFIG_PATH=/app/config.yaml
    networks:
      - go_network
    depends_on:
      rabbitmq_broker:
        condition: service_healthy
      account_service:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  go_network:
    driver: bridge