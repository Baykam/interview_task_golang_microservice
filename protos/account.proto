syntax = "proto3";

package accountProto;

// Go projelerinde paket import yolları için opsiyonel tanımlama
option go_package = "./";

// AccountService, Account Service (Server) tarafından implement edilecek
// ve Transaction Service (Client) tarafından çağrılacaktır.
service AccountService {
  // Güncel hesap bakiyesini döner.
  rpc GetAccountBalance (GetAccountBalanceRequest) returns (GetAccountBalanceResponse);

  // Bakiyeyi atomik (atomic) olarak günceller (+ veya - yönlü).
  rpc UpdateAccountBalance (UpdateAccountBalanceRequest) returns (UpdateAccountBalanceResponse);

  // Hesabın sistemde var olup olmadığını doğrular.
  rpc CheckAccountExists (CheckAccountExistsRequest) returns (CheckAccountExistsResponse);

  // Hesaba ait tüm işlem geçmişini (Transaction History) listeler.
  rpc GetTransactionHistory (GetTransactionHistoryRequest) returns (GetTransactionHistoryResponse);
}

// --- İstek ve Yanıt Mesajları ---

message GetAccountBalanceRequest {
  string account_id = 1; // Şartnamede UUID veya BIGINT olarak belirtilmiştir
}

message GetAccountBalanceResponse {
  string account_id = 1;
  int64 balance = 2;     // Bakiye kuruş/cent cinsinden tutulduğu için int64 (BIGINT karşılığı)
  string currency = 3;   // Örn: USD, TRY, EUR
}

message UpdateAccountBalanceRequest {
  string account_id = 1;
  int64 amount = 2;           // Değişecek tutar (Kuruş/Cent cinsinden)
  string operation_type = 3;  // "deposit", "withdraw" veya "transfer" vb.
}

message UpdateAccountBalanceResponse {
  bool success = 1;
  int64 new_balance = 2;      // Güncelleme sonrası yeni bakiye
  string error_message = 3;   // Başarısızlık durumunda hata detayı
}

message CheckAccountExistsRequest {
  string account_id = 1;
}

message CheckAccountExistsResponse {
  bool exists = 1;
}

// --- İşlem Geçmişi (Transaction History) İçin Eklenen Mesajlar ---

message GetTransactionHistoryRequest {
  string account_id = 1;      // Geçmişi sorgulanan hesap ID'si
}

message TransactionMessage {
  string id = 1;               // İşlemin benzersiz ID'si
  string account_id = 2;       // İşlemi başlatan ana hesap ID'si
  string to_account_id = 3;    // Transfer durumunda hedef hesap ID'si (boş kalabilir)
  int64 amount = 4;            // İşlem tutarı (Kuruş/Cent cinsinden int64)
  string transaction_type = 5; // "deposit", "withdraw", "transfer"
  string created_at = 6;       // İşlem tarihi (Örn: RFC3339 string formatında)
}

message GetTransactionHistoryResponse {
  repeated TransactionMessage transactions = 1; // İşlem geçmişi listesi
}